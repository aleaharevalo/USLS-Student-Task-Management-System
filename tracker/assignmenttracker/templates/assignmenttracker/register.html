{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USLS Student Assignment Tracker - Create Account</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen flex items-center justify-center bg-[#004e3b]" 
      style="background: linear-gradient(to right, rgba(0, 78, 59, 0.85), rgba(0, 104, 55, 0.7)), 
             url('https://www.usls.edu.ph/uploads/posts/USLS-ready-for-71st-Handumanan-Week-on-July-3-7.jpg'); 
             background-size: cover; 
             background-position: center; 
             background-attachment: fixed;">
    
    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden p-8 ">
            
            <div class="flex justify-center mb-6">
                <img src="https://aims.usls.edu.ph/lasalle/images/logo/png/logoforlogin-usls.png?v=1711001227" 
                     alt="USLS Logo" 
                     class="h-24 w-auto object-contain">
            </div>

            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-[11px] font-black uppercase">
                 {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'register' %}" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-1">
                    <div class="relative flex items-center">
                        <input type="text" name="username" placeholder="Student ID" 
                               class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 transition-all" required>
                        <div class="absolute right-4 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="relative flex items-center">
                        <input type="text" name="full_name" placeholder="Full Name" 
                               class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 transition-all" required>
                        <div class="absolute right-4 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-1 mt-4">
                    <div class="relative flex items-center">
                        <input type="password" id="passwordField" name="password" placeholder="Set Password" 
                               class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 transition-all" required>
                        <button type="button" onclick="togglePassword()" class="absolute right-4 text-gray-400 hover:text-green-700 focus:outline-none">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-3 bg-[#006837] text-white rounded-lg font-bold hover:bg-green-800 transition shadow-md active:scale-95">
                        Register
                    </button>
                </div>
            </form>

            <div class="text-center mt-8">
                <p class="text-sm text-gray-500">
                    Already registered? 
                    <a href="{% url 'login' %}" class="text-[#006837] hover:underline">Back to Login</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white text-[10px] mt-8 opacity-60 leading-tight uppercase">
            UNIVERSITY OF ST. LA SALLE • BACOLOD CITY<br>
            © 2026 Student Task Management System
        </p>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
