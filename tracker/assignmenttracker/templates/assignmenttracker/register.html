{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USLS - Create Account</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[#006837] via-[#004d29] to-[#00331b] font-sans">
    
    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden p-8 border-t-8 border-[#004d29]">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-serif text-green-900 font-black tracking-tighter uppercase leading-none">Create Account</h1>
                <p class="text-[10px] tracking-[0.3em] font-bold text-green-700 uppercase mt-2 italic">Student Registration Portal</p>
            </div>

            {% if error %}
            <div class="mb-6 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-[11px] font-black uppercase italic animate-pulse">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-widest">Student ID No.</label>
                    <div class="relative group">
                        <input type="text" name="username"
                               class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none text-gray-700 font-bold transition-all" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-widest">Full Name</label>
                    <div class="relative group">
                        <input type="text" name="full_name"
                               class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none text-gray-700 font-bold transition-all" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-widest">Set Password</label>
                    <div class="relative">
                        <input type="password" id="passwordField" name="password"
                               class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none text-gray-700 transition-all" required>
                        
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-green-700 transition-colors focus:outline-none">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.301 8.844 7.004 6 12 6s8.699 2.844 9.964 5.678c.22.472.22.992 0 1.464C20.699 15.156 16.996 18 12 18s-8.699-2.844-9.964-5.678Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                            <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-4 bg-[#006837] text-white rounded-lg font-black uppercase text-xs tracking-[0.2em] hover:bg-green-800 transition-all shadow-xl shadow-green-900/20 transform active:scale-[0.98]">
                        Register Account
                    </button>
                </div>
            </form>

            <div class="text-center mt-8 border-t pt-5 border-gray-100">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">Already registered?</p>
                <a href="{% url 'login' %}" class="text-sm text-blue-600 hover:text-blue-800 font-black italic tracking-tight transition-colors">
                    ← Back to Login Portal
                </a>
            </div>
        </div>

        <p class="text-center text-white/60 text-[9px] mt-8 uppercase font-bold tracking-[0.3em] leading-relaxed">
            University of St. La Salle<br>
            AIMS Student Tracker v1.0 • 2026
        </p>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
