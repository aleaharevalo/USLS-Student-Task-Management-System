{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="mb-8">
        <a href="{% url 'dashboard' %}" class="text-green-700 font-semibold hover:underline">← Back to Dashboard</a>
        <h1 class="text-3xl font-bold text-gray-900 mt-4">Add New Requirement</h1>
        <p class="text-gray-600">Enter the details of your task to centralize your tracking.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">What is the task?</label>
                {{ form.title }}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Subject</label>
                    {{ form.subject }}
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Deadline</label>
                    {{ form.due_date }}
                </div>
            </div>

            <div class="p-4 bg-red-50 rounded-xl border border-red-100 flex items-center">
                {{ form.is_major }}
                <label class="ml-3 text-sm font-bold text-red-700 uppercase tracking-tight">This is a Major Project/Exam</label>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Additional Notes (Optional)</label>
                {{ form.description }}
            </div>

            <button type="submit" class="w-full bg-green-700 text-white py-4 rounded-xl font-black text-xl hover:bg-green-800 transition shadow-lg">
                SAVE ASSIGNMENT
            </button>
        </form>
    </div>
</div>
{% endblock %}
