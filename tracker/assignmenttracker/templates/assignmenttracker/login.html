{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://usls.edu.ph/uploads/icons/fav-star.png">

    <title>USLS Student Assignment Tracker - Login</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen flex items-center justify-center bg-[#004e3b]" 
      style="background: linear-gradient(to right, rgba(0, 78, 59, 0.85), rgba(0, 104, 55, 0.7)), 
             url('https://www.usls.edu.ph/uploads/posts/USLS-ready-for-71st-Handumanan-Week-on-July-3-7.jpg'); 
             background-size: cover; 
             background-position: center; 
             background-attachment: fixed;">
    
                <div class="w-full max-w-md px-4">
                    <div class="bg-white rounded-xl shadow-2xl overflow-hidden p-8">
                        
                        <div class="flex justify-center mb-6">
                            <img src="https://aims.usls.edu.ph/lasalle/images/logo/png/logoforlogin-usls.png?v=1711001227" 
                                alt="USLS Logo" 
                                class="h-24 w-auto object-contain">
                        </div>
                

                        <form method="POST" class="space-y-4">
                            {% csrf_token %}
                        <div class="space-y-1">
                <div class="relative flex items-center">
                    <input type="text" name="username" placeholder="Username" 
                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 transition-all">
                    <div class="absolute right-4 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="space-y-1 mt-4">
                <div class="relative flex items-center">
                    <input type="password" id="passwordInput" name="password" placeholder="Password" 
                        class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 transition-all">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 text-gray-400 hover:text-gray-600 focus:outline-none">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

                <button type="submit" class="w-full mt-4 py-3 bg-[#006837] text-white rounded-lg font-bold hover:bg-green-800 transition-all shadow-md active:scale-95">
                    Log in
                </button>
            </form>

            <div class="text-center mt-8">
                <p class="text-sm text-gray-500"> 
                    <a href="{% url 'register' %}" class="text-[#006837] hover:underline">Create an Account</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white text-[10px] mt-8 opacity-60 leading-tight">
            UNIVERSITY OF ST. LA SALLE • BACOLOD CITY<br>
            © 2026 Student Task Management System
        </p>
    </div>

</body>
</html>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('passwordInput');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
    }
</script>
