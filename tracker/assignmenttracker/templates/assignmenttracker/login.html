{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USLS Student Assignment Tracker - Login</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-900 via-green-700 to-green-500">
    
    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden p-8 border-t-8 border-green-800">
            
            <div class="flex justify-center mb-6">
                <div class="text-center">
                    <h1 class="text-2xl font-serif text-green-900 font-bold italic">University of</h1>
                    <h1 class="text-4xl font-serif text-green-900 font-black tracking-tighter">St. La Salle</h1>
                    <p class="text-xs tracking-[0.3em] font-bold text-green-700">BACOLOD</p>
                </div>
            </div>

            <h2 class="text-center text-xl font-medium text-gray-600 mb-8 border-b pb-2">Student Assignment Tracker</h2>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div class="relative">
                    <input type="text" name="username" placeholder="Student ID" class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700">
                </div>

                <div class="relative">
                    <input type="password" name="password" placeholder="Password" class="w-full px-4 py-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700">
                </div>

                <div class="flex gap-2 pt-4">
                    <button type="submit" class="flex-1 py-3 bg-green-700 text-white rounded-lg font-bold hover:bg-green-800 transition">
                        Log in
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <a href="{% url 'register' %}" class="text-sm text-blue-600 hover:underline font-medium">No account yet? Click Here.</a>
            </div>
        </div>

        <p class="text-center text-white text-[10px] mt-8 opacity-80 leading-tight">
            © Copyright 2026 Academic Information Management System (AIMS)<br>
            All Rights Reserved
        </p>
    </div>

</body>
</html>
